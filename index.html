<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    <link rel="stylesheet" href="./styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <script src="script.js" defer></script>
    <title>Tip Calculator App</title>
  </head>
  <body>
    <img id="logo" src="images/logo.svg">

    <main>
      <form id="tip-form">
        <div class="form-input">
          <div class="label-row">
            <label for="bill">Bill</label>
            <p class="error-msg" hidden>Can't be zero</p>
          </div>
          <div class="input-wrapper">
            <img class="input-icon" src="images/icon-dollar.svg">
            <input type="number" id="bill" name="bill" placeholder="0" min="0">
          </div>
        </div>

        <fieldset id="tip-fieldset">
          <legend>Select Tip %</legend>
          <div id="tip-options">
            <button type="button" value="5">5%</button>
            <button type="button" value="10">10%</button>
            <button type="button" value="15">15%</button>
            <button type="button" value="25">25%</button>
            <button type="button" value="50">50%</button>
            <input type="number" placeholder="Custom" min="0">
          </div>
        </fieldset>

        <div class="form-input">
          <div class="label-row">
            <label for="people">Number of People</label>
            <p class="error-msg" hidden>Can't be zero</p>
          </div>
          <div class="input-wrapper">
            <img class="input-icon" src="images/icon-person.svg">
            <input type="number" id="people" name="people" placeholder="0" min="0">
          </div>
        </div>
      </form>

      <section id="results-card">
        <div id="results-div">
          <div class="result-row">
            <div>
              <p class="label-text">Tip Amount</p>
              <p class="person-text">/ person</p>
            </div>
            <p id="tip-amount">$0.00</p>
          </div>
          
          <div class="result-row">
            <div>
              <p class="label-text">Total</p>
              <p class="person-text">/ person</p>
            </div>
            <p id="total">$0.00</p>
          </div>
        </div>

        <button id="reset-btn" disabled>RESET</button>
      </section>
    </main>
  </body>
</html>
