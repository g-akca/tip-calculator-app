<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    <link rel="stylesheet" href="./styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <script src="script.js" defer></script>
    <title>Tip Calculator App</title>
  </head>
  <body>
    <h1>SPLITTER</h1>

    <main>
      <form id="tip-form">
        <div class="form-input">
          <div class="label-row">
            <label for="bill">Bill</label>
            <p class="error-msg" hidden>Can't be zero</p>
          </div>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <path d="M7,15H9C9,16.08 10.37,17 12,17C13.63,17 15,16.08 15,15C15,13.9 13.96,13.5 11.76,12.97C9.64,12.44 7,11.78 7,9C7,7.21 8.47,5.69 10.5,5.18V3H13.5V5.18C15.53,5.69 17,7.21 17,9H15C15,7.92 13.63,7 12,7C10.37,7 9,7.92 9,9C9,10.1 10.04,10.5 12.24,11.03C14.36,11.56 17,12.22 17,15C17,16.79 15.53,18.31 13.5,18.82V21H10.5V18.82C8.47,18.31 7,16.79 7,15Z" />
            </svg>
            <input type="number" id="bill" name="bill" placeholder="0" min="0">
          </div>
        </div>

        <fieldset id="tip-fieldset">
          <legend>Select Tip %</legend>
          <div id="tip-options">
            <button type="button" value="5">5%</button>
            <button type="button" value="10">10%</button>
            <button type="button" value="15">15%</button>
            <button type="button" value="25">25%</button>
            <button type="button" value="50">50%</button>
            <input type="number" placeholder="Custom" min="0">
          </div>
        </fieldset>

        <div class="form-input">
          <div class="label-row">
            <label for="people">Number of People</label>
            <p class="error-msg" hidden>Can't be zero</p>
          </div>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <path d="M12,4A4,4 0 0,1 16,8A4,4 0 0,1 12,12A4,4 0 0,1 8,8A4,4 0 0,1 12,4M12,14C16.42,14 20,15.79 20,18V20H4V18C4,15.79 7.58,14 12,14Z" />
            </svg>
            <input type="number" id="people" name="people" placeholder="0" min="0">
          </div>
        </div>
      </form>

      <section id="results-card">
        <div id="results-div">
          <div class="result-row">
            <div>
              <p class="label-text">Tip Amount</p>
              <p class="person-text">/ person</p>
            </div>
            <p id="tip-amount">$0.00</p>
          </div>
          
          <div class="result-row">
            <div>
              <p class="label-text">Total</p>
              <p class="person-text">/ person</p>
            </div>
            <p id="total">$0.00</p>
          </div>
        </div>

        <button id="reset-btn" disabled>RESET</button>
      </section>
    </main>
  </body>
</html>
